<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard</title>
<link rel="stylesheet" href="shared.css">
<style>
  .overview-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 10px;
    margin-bottom: 2rem;
  }
  .ov-card {
    padding: 1.25rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    text-decoration: none;
    display: block;
    transition: all 0.2s;
  }
  .ov-card:hover { transform: translateY(-2px); border-color: var(--border2); }
  .ov-label { font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.07em; margin-bottom: 6px; }
  .ov-stat  { font-size: 32px; font-weight: 300; margin-bottom: 2px; }
  .ov-sub   { font-size: 12px; color: var(--text2); margin-bottom: 10px; }
  .ov-streak { display: flex; gap: 3px; }
  .ov-dot   { width: 8px; height: 8px; border-radius: 50%; background: var(--surface3); }

  .section-title {
    font-size: 12px; letter-spacing: 0.07em; text-transform: uppercase;
    color: var(--text3); margin-bottom: 1rem; margin-top: 2rem;
  }
  .goal-links { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 8px; }
  .goal-link {
    padding: 1rem 1.25rem;
    border-radius: var(--radius);
    border: 1px solid var(--border);
    background: var(--surface);
    text-decoration: none;
    display: flex; align-items: center; gap: 12px;
    transition: all 0.2s;
  }
  .goal-link:hover { border-color: var(--border2); background: var(--surface2); transform: translateX(3px); }
  .goal-link .gl-icon { font-size: 22px; }
  .goal-link .gl-name { font-size: 14px; font-weight: 500; color: var(--text); margin-bottom: 2px; }
  .goal-link .gl-sub  { font-size: 12px; color: var(--text2); }
  .goal-link .gl-arrow { margin-left: auto; color: var(--text3); font-size: 16px; }
</style>
</head>
<body>
<div class="shell">

  <div class="header">
    <div class="date-line" id="dateLine"></div>
    <h1>Good <span id="greeting-time" class="accent-gold">morning</span> — here's your day</h1>
  </div>

  <!-- OVERVIEW STATS -->
  <div class="overview-grid">
    <a href="quran.html" class="ov-card">
      <div class="ov-label">Quran</div>
      <div class="ov-stat" id="ov-quran" style="color:var(--gold)">0</div>
      <div class="ov-sub">surahs memorized</div>
      <div class="ov-streak" id="ov-q-streak"></div>
    </a>
    <a href="driving.html" class="ov-card">
      <div class="ov-label">Driving</div>
      <div class="ov-stat" id="ov-driving" style="color:var(--teal)">0%</div>
      <div class="ov-sub">milestones complete</div>
      <div class="ov-streak" id="ov-d-streak"></div>
    </a>
    <a href="fitness.html" class="ov-card">
      <div class="ov-label">Fitness</div>
      <div class="ov-stat" id="ov-fitness" style="color:var(--blue)">0</div>
      <div class="ov-sub">workout days</div>
      <div class="ov-streak" id="ov-f-streak"></div>
    </a>
    <a href="business.html" class="ov-card">
      <div class="ov-label">Business</div>
      <div class="ov-stat" id="ov-business" style="color:var(--purple)">0%</div>
      <div class="ov-sub">tasks done</div>
      <div class="ov-streak" id="ov-b-streak"></div>
    </a>
  </div>

  <!-- QUICK LINKS -->
  <div class="section-title">Go to goal</div>
  <div class="goal-links">
    <a href="quran.html" class="goal-link">
      <span class="gl-icon">🕌</span>
      <div><div class="gl-name">Quran Memorization</div><div class="gl-sub" id="ql-quran">Loading…</div></div>
      <span class="gl-arrow">›</span>
    </a>
    <a href="driving.html" class="goal-link">
      <span class="gl-icon">🚗</span>
      <div><div class="gl-name">Driver's License</div><div class="gl-sub" id="ql-driving">Loading…</div></div>
      <span class="gl-arrow">›</span>
    </a>
    <a href="fitness.html" class="goal-link">
      <span class="gl-icon">💪</span>
      <div><div class="gl-name">Home Fitness</div><div class="gl-sub" id="ql-fitness">Loading…</div></div>
      <span class="gl-arrow">›</span>
    </a>
    <a href="business.html" class="goal-link">
      <span class="gl-icon">💼</span>
      <div><div class="gl-name">Side Business</div><div class="gl-sub" id="ql-business">Loading…</div></div>
      <span class="gl-arrow">›</span>
    </a>
  </div>

</div>

<script>
  // ── helpers ──────────────────────────────────────────────
  function load(key, fallback) {
    try { const v = localStorage.getItem(key); return v !== null ? JSON.parse(v) : fallback; }
    catch(e) { return fallback; }
  }
  function streakDots(elId, streak, color, days) {
    const el = document.getElementById(elId);
    if (!el) return;
    el.innerHTML = '';
    for (let i = days-1; i >= 0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      const dot = document.createElement('div');
      dot.className = 'ov-dot';
      if (streak.includes(d.toDateString())) dot.style.background = color;
      el.appendChild(dot);
    }
  }

  // ── date & greeting ──────────────────────────────────────
  const now = new Date();
  document.getElementById('dateLine').textContent =
    now.toLocaleDateString('en-US',{weekday:'long',year:'numeric',month:'long',day:'numeric'});
  const h = now.getHours();
  document.getElementById('greeting-time').textContent =
    h < 12 ? 'morning' : h < 17 ? 'afternoon' : 'evening';

  // ── quran ────────────────────────────────────────────────
  const qMem     = load('q_memorized', []);
  const qCurrent = load('q_current', null);
  const qStreak  = load('q_streak', []);
  document.getElementById('ov-quran').textContent = qMem.length;
  document.getElementById('ql-quran').textContent =
    qCurrent ? `Currently on Surah ${qCurrent}` : qMem.length > 0 ? `${qMem.length} / 114 done` : 'No surah selected yet';
  streakDots('ov-q-streak', qStreak, 'var(--gold)', 7);

  // ── driving ──────────────────────────────────────────────
  const dDone   = load('d_done', []);
  const dTarget = load('d_target', null);
  const dStreak = load('d_streak', []);
  const dPct    = Math.round((dDone.length / 10) * 100);
  document.getElementById('ov-driving').textContent = dPct + '%';
  let dSub = `${dDone.length} / 10 milestones`;
  if (dTarget) {
    const diff = Math.ceil((new Date(dTarget) - now) / 86400000);
    dSub += diff > 0 ? ` · ${diff}d to go` : ' · Date reached!';
  }
  document.getElementById('ql-driving').textContent = dSub;
  streakDots('ov-d-streak', dStreak, 'var(--teal)', 7);

  // ── fitness ──────────────────────────────────────────────
  const fStreak = load('f_streak', []);
  const fBestP  = load('f_pushup_best', 0);
  const fBestU  = load('f_pullup_best', 0);
  document.getElementById('ov-fitness').textContent = fStreak.length;
  document.getElementById('ql-fitness').textContent =
    `Best: ${fBestP} push-ups · ${fBestU} pull-ups`;
  streakDots('ov-f-streak', fStreak, 'var(--blue)', 7);

  // ── business ─────────────────────────────────────────────
  const bTasks    = load('b_tasks', []);
  const bStreak   = load('b_streak', []);
  const bDone     = bTasks.filter(t => t.done).length;
  const bTotal    = bTasks.length;
  const bPct      = bTotal ? Math.round((bDone / bTotal) * 100) : 0;
  document.getElementById('ov-business').textContent = bPct + '%';
  document.getElementById('ql-business').textContent =
    bTotal ? `${bDone} / ${bTotal} tasks done this week` : 'No tasks yet';
  streakDots('ov-b-streak', bStreak, 'var(--purple)', 7);
</script>
</body>
</html>
